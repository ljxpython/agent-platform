<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试页面</title>
</head>
<body>
    <h1>API测试页面</h1>
    <button onclick="testUserAPI()">测试用户API</button>
    <button onclick="testRoleAPI()">测试角色API</button>
    <button onclick="testDepartmentAPI()">测试部门API</button>

    <div id="result"></div>

    <script>
        async function testUserAPI() {
            console.log('🔄 开始测试用户API');
            try {
                const response = await fetch('http://localhost:8000/api/v1/system/users?page=1&page_size=10');
                const data = await response.json();
                console.log('✅ 用户API响应:', data);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('❌ 用户API错误:', error);
            }
        }

        async function testRoleAPI() {
            console.log('🔄 开始测试角色API');
            try {
                const response = await fetch('http://localhost:8000/api/v1/system/roles?page_size=1000');
                const data = await response.json();
                console.log('✅ 角色API响应:', data);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('❌ 角色API错误:', error);
            }
        }

        async function testDepartmentAPI() {
            console.log('🔄 开始测试部门API');
            try {
                const response = await fetch('http://localhost:8000/api/v1/system/departments/tree');
                const data = await response.json();
                console.log('✅ 部门API响应:', data);
                document.getElementById('result').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                console.error('❌ 部门API错误:', error);
            }
        }
    </script>
</body>
</html>
